spring.application.name=mar-de-prata-app
server.port=8083

# SQLite
spring.datasource.url=jdbc:sqlite:/data/.openclaw/workspace/mar-de-prata-app/mar-de-prata.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Admin
app.admin-secret=${ADMIN_SECRET:mar-de-prata-admin-secret}
app.base-url=${BASE_URL:http://localhost:8083}

# WebSocket
spring.websocket.enabled=true
