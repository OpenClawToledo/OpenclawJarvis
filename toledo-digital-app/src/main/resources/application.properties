server.port=8085
spring.application.name=toledo-digital-app

# SQLite
spring.datasource.url=jdbc:sqlite:/data/.openclaw/workspace/toledo-digital-app/toledodigital.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# Admin secret (mudar em produção)
admin.secret=${ADMIN_SECRET:toledodigital2026}

# JWT
jwt.secret=${JWT_SECRET:toledodigital_jwt_2026_secret_key_muito_seguro}
jwt.expiration=86400000

# Email (configurar SMTP)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${SMTP_USER:toledothelast@gmail.com}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
