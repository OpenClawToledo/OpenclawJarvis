server.port=8081
spring.application.name=fiosmj-app
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# === CREDENCIAIS — via variáveis de ambiente ===
# Nunca colocar valores reais aqui. Usar .env no servidor.
mercadopago.access-token=${MP_ACCESS_TOKEN:}
mercadopago.public-key=${MP_PUBLIC_KEY:}
openclaw.gateway.url=${OPENCLAW_GATEWAY_URL:http://localhost:18789}
openclaw.gateway.token=${OPENCLAW_GATEWAY_TOKEN:}
notification.maju.phone=${MAJU_PHONE:+553399892409}
notification.toledo.phone=${TOLEDO_PHONE:+351931120429}

spring.datasource.url=jdbc:sqlite:/data/.openclaw/workspace/fiosmj-app/fiosmj.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT — via variável de ambiente obrigatória
jwt.secret=${JWT_SECRET:CHANGE_ME_BEFORE_DEPLOY}
jwt.expiration=604800000

# Admin secret — via variável de ambiente obrigatória
admin.secret=${ADMIN_SECRET:CHANGE_ME_BEFORE_DEPLOY}

# Brevo newsletter
brevo.api.key=${BREVO_API_KEY:}
brevo.list.id=${BREVO_LIST_ID:0}
