spring.application.name=gabinete-app
server.port=8084

# SQLite
spring.datasource.url=jdbc:sqlite:/data/.openclaw/workspace/gabinete-app/gabinete.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Admin
app.admin-secret=${ADMIN_SECRET:gabinete-admin-secret}
app.base-url=${BASE_URL:http://localhost:8084}

# Mail (configurar depois com credenciais do cliente)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
