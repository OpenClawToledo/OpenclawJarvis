limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=checkout:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=contact:10m rate=5r/m;

server {
    listen 80;
    server_name fiosmj.com www.fiosmj.com;

    # Redirecionar HTTP → HTTPS em produção
    # return 301 https://$host$request_uri;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ── Limitar tamanho uploads ─────────────────────────────
    client_max_body_size 15M;

    # ── Bloquear paths maliciosos ────────────────────────────
    location ~* \.(env|git|bak|sql|sh)$ { return 404; }
    location ~* /(wp-admin|phpmyadmin|\.git|etc/passwd) { return 404; }

    # ── Admin — só IPs autorizados ──────────────────────────
    location /admin {
        # Descomentar e preencher em produção:
        # allow 1.2.3.4;  # IP Toledo
        # deny all;
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Checkout (MercadoPago) ───────────────────────────────
    location /api/checkout {
        limit_req zone=checkout burst=5 nodelay;
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Contacto / Newsletter ────────────────────────────────
    location ~ ^/api/(contact|newsletter) {
        limit_req zone=contact burst=3 nodelay;
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API geral ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=15 nodelay;
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Tudo o resto → backend ───────────────────────────────
    location / {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
